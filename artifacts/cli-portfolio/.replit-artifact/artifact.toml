kind = "web"
previewPath = "/"
title = "CLI Portfolio"
version = "1.0.0"
id = "artifacts/cli-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23684

[services.development]
run = "pnpm --filter @workspace/cli-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cli-portfolio", "run", "build" ]
publicDir = "artifacts/cli-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23684"
BASE_PATH = "/"
